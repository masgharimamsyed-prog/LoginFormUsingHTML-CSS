<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="page">
        <p id="welcome">WELCOME BACK</p>
        <p>Please Enter Your details</p>
        <form>
            <div id="info">

                <div id="mail">
                    <label for="Email">
                        Email:
                    </label>
                    <input type="text" id="Email" placeholder="Enter Your Email" name="mail">

                </div>

                <div id="pass">
                    <label for="Password">
                        Password:
                    </label>
                    <input type="password" id="Password" placeholder="Password" name="pass">
                </div>
                 <div id="gender">
                Select Your Gender:

                <div id="genderOption">
                    <input type="radio" id="male" value="male" name="gender">
                    <label for="male">Male</label>

                    <input type="radio" id="female" value="female" name="gender">
                    <label for="female">female</label>

                    <input type="radio" id="other" value="other" name="gender">
                    <label for="other">Other</label>
                </div>
            </div>

            <div id="coun">
                <label for="Country">Select Your country:</label>
                <select id="Country">
                    <option>Country</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="India">India</option>
                    <option value="Japan">Japan</option>
                    <option value="Asia">Asia</option>

                </select>
            </div>


            </div>



           
            <div id="agree">
                Are You Agree To Our terms and Conditions?
                <input type="checkbox" id="agree" name="agree">
                <label for="agree">Yes</label>
            </div>

            <button id="login">
                Login
            </button>

            <button id="signup">
                SignUp
            </button>
            <hr>
             <p style="text-align: left;margin-left: 6%;">Or continue with:</p>
            <div id="continue">
               
                <img src="googleimg.jpg" id="google">
    

               
                 <img src="microsoft.png">
                
              
               
                <img src="apple.png">
            </div>



        </form>


    </div>


</body>

</html>
